name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (all workspaces)
        run: npm run build

      # Blocking smoke gate (ASSUMPTIONS D1): the walking skeleton must run the
      # full mock pipe — POST /runs -> published event -> /published/:id serves
      # HTML -> ordered journal. If the spine is broken, fail fast and loud
      # before the broader suite. The protected pipe stays green from hour 2.
      - name: Walking-skeleton smoke gate (mock pipe E2E)
        run: npm run smoke --workspace backend

      # Coverage gate (80/70/60). Per ASSUMPTIONS D20, env-gated real paths
      # (AnthropicAgent network calls) and the Sink's real-IO host read are
      # excluded via inline `c8 ignore` + covered by contract-shape / integration
      # tests; the Mock/deterministic path is fully covered.
      - name: Test with coverage (80/70/60 gate)
        run: npm run test:coverage
